<article class="theorem theorem-like"><h3 class="heading">
<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">11.14</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Third Isomorphism Theorem.</span>
</h3>
<div class="para logical">
<div class="para">Let <span class="process-math">\(G\)</span> be a group and <span class="process-math">\(N\)</span> and <span class="process-math">\(H\)</span> be normal subgroups of <span class="process-math">\(G\)</span> with <span class="process-math">\(N \subset H\text{.}\)</span> Then</div>
<div class="displaymath process-math">
\begin{equation*}
G/H \cong \frac{G/N}{H/N}\text{.}
\end{equation*}
</div>
