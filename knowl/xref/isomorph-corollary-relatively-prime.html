</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(n_1, \ldots, n_k\)</span> be positive integers. Then</div>
<div class="displaymath process-math">
\begin{equation*}
\prod_{i=1}^k {\mathbb Z}_{n_i} \cong {\mathbb Z}_{n_1 \cdots n_k}
\end{equation*}
</div>
<div class="para">if and only if <span class="process-math">\(\gcd( n_i, n_j) =1\)</span> for <span class="process-math">\(i \neq j\text{.}\)</span>
</div>
