<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise Progress</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; }
  .card-title { font-size: 13px; color: #888; margin-bottom: 4px; }
  .card-chapter { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .bar-bg { background: #f0f0f0; border-radius: 99px; height: 8px; margin-bottom: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }
  .label { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
  .pct { font-weight: 500; color: #111; }
  .back { font-size: 13px; color: #378ADD; text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<a class="back" href="submissions.html">← Back to submissions</a>
<h1>Exercise progress</h1>
<div class="grid">
  <div class="card">
    <div class="card-title">Chapter 1</div>
    <div class="card-chapter">Preliminaries</div>
    <div class="bar-bg"><div class="bar-fill" style="width:73%;background:#1D9E75;"></div></div>
    <div class="label"><span>22 / 30</span><span class="pct">73%</span></div>
  </div>
  <div class="card">
    <div class="card-title">Chapter 2</div>
    <div class="card-chapter">Integers</div>
    <div class="bar-bg"><div class="bar-fill" style="width:33%;background:#378ADD;"></div></div>
    <div class="label"><span>13 / 40</span><span class="pct">33%</span></div>
  </div>
  <div class="card">
    <div class="card-title">Chapter 3</div>
    <div class="card-chapter">Groups</div>
    <div class="bar-bg"><div class="bar-fill" style="width:50%;background:#378ADD;"></div></div>
    <div class="label"><span>27 / 54</span><span class="pct">50%</span></div>
  </div>
</div>
</body>
</html>
